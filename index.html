<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes | Kupal Mc</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black;
        }

        #map {
            width: 100%;
            height: 100vh;
            cursor: grab;
            background-color: black;
        }

        #map:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialize the map with Simple Coordinate System
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2,
            maxZoom: 2,
            zoomSnap: 0.5
        });

        const url = 'tree.png';
        const img = new Image();
        img.src = url;

        img.onload = function() {
            const w = this.width;
            const h = this.height;

            const southWest = map.unproject([0, h], map.getMaxZoom() - 1);
            const northEast = map.unproject([w, 0], map.getMaxZoom() - 1);
            const bounds = new L.LatLngBounds(southWest, northEast);

            L.imageOverlay(url, bounds).addTo(map);
        
            map.setMaxBounds(bounds);

            const centerY = (southWest.lat + northEast.lat) / 2;
            const farLeftX = southWest.lng;

            map.setView([centerY, farLeftX], 0);
        };
    </script>
</body>
</html>
